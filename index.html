<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Retainly — Novo endereço</title>
    <meta
      name="description"
      content="A plataforma Retainly mudou. Acesse o novo endereço para continuar seus estudos."
    />
    <!-- Redirecionamento automático após alguns segundos (opcional) -->
    <meta http-equiv="refresh" content="12;url=https://retainly.com.br/" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1419;
        --card: #1a2332;
        --text: #e8eef5;
        --muted: #94a3b8;
        --accent: #3b82f6;
        --accent-hover: #60a5fa;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          Ubuntu,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        line-height: 1.55;
      }
      main {
        max-width: 32rem;
        background: var(--card);
        border-radius: 12px;
        padding: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      }
      h1 {
        font-size: 1.35rem;
        font-weight: 600;
        margin: 0 0 0.75rem;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0 0 1rem;
        color: var(--muted);
        font-size: 0.95rem;
      }
      p:last-of-type {
        margin-bottom: 0;
      }
      a.button {
        display: inline-block;
        margin-top: 1.25rem;
        padding: 0.75rem 1.25rem;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        border-radius: 8px;
        font-size: 0.95rem;
      }
      a.button:hover {
        background: var(--accent-hover);
      }
      .countdown {
        margin-top: 1rem;
        font-size: 0.85rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>A Retainly mudou de endereço</h1>
      <p>
        Se você usava a versão antiga da plataforma, utilize o novo site para
        acessar sua conta, simulados e conteúdo atualizado.
      </p>
      <p>
        <strong>Novo endereço:</strong>
        <a href="https://retainly.com.br/">https://retainly.com.br/</a>
      </p>
      <a class="button" href="https://retainly.com.br/">Ir para retainly.com.br</a>
      <p class="countdown" id="hint">
        Esta página redireciona automaticamente em alguns segundos.
      </p>
    </main>
    <script>
      (function () {
        var url = 'https://retainly.com.br/';
        var seconds = 12;
        var el = document.getElementById('hint');
        var left = seconds;
        function tick() {
          if (el) {
            el.textContent =
              'Redirecionamento automático em ' +
              left +
              's… Se não abrir, use o botão acima.';
          }
          if (left <= 0) {
            window.location.replace(url);
            return;
          }
          left -= 1;
          setTimeout(tick, 1000);
        }
        setTimeout(tick, 1000);
      })();
    </script>
  </body>
</html>
